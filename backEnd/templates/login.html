{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="glass border border-white rounded-[2.5rem] p-10 shadow-xl w-full max-w-md">

        <div class="text-center mb-8">
            <span class="text-5xl">✈️</span>
            <h2 class="text-3xl font-extrabold text-gray-900 mt-3">Kirish</h2>
            <p class="text-gray-400 mt-1">Hisobingizga kiring</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-2xl text-sm font-medium
                    {% if message.tags == 'error' %} bg-red-50 text-red-600 border border-red-200
                    {% else %} bg-green-50 text-green-600 border border-green-200 {% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Elektron pochta</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="example@email.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Parol</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="btn-animate action-btn w-full mt-6 bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition shadow-lg">
                Kirish
            </button>
        </form>

        <p class="text-center text-gray-400 text-sm mt-6">
            Hisobingiz yo'qmi?
            <a href="{% url 'register' %}" class="text-blue-600 font-semibold hover:underline">Ro'yxatdan o'tish</a>
        </p>
    </div>
</div>
{% endblock %}
